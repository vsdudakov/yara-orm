name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install lint tools
        # factory-boy: optional runtime dep of yara_orm.contrib.factory — ty
        # must be able to resolve its import.
        run: pip install ruff ty factory-boy
      - name: ruff check
        run: ruff check python tests benchmarks examples
      - name: ruff format --check
        run: ruff format --check python tests benchmarks examples
      - name: ty
        run: ty check python/yara_orm

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: orm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: orm_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -uroot -proot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: orm_test
        ports:
          - 3307:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      oracle:
        image: gvenzl/oracle-free:slim
        env:
          ORACLE_PASSWORD: oracle
          APP_USER: orm
          APP_USER_PASSWORD: orm
        ports:
          - 1521:1521
        options: >-
          --health-cmd healthcheck.sh
          --health-interval 10s
          --health-timeout 10s
          --health-retries 30
          --health-start-period 60s
    env:
      ORM_TEST_DB: postgres://postgres:postgres@localhost:5432/orm_test
      ORM_TEST_DB2: postgres://postgres:postgres@localhost:5432/orm_test2
      ORM_TEST_MYSQL: mysql://root:root@localhost:3306/orm_test
      ORM_TEST_MARIADB: mariadb://root:root@localhost:3307/orm_test
      ORM_TEST_ORACLE: oracle://orm:orm@localhost:1521/FREEPDB1
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Create the second test database (two-database tests)
        run: psql "$ORM_TEST_DB" -c 'CREATE DATABASE orm_test2;'
      - name: Install Python deps
        run: pip install maturin pytest pytest-asyncio pytest-cov factory-boy
      - name: Build and install the Rust engine
        run: |
          maturin build --release --out dist --interpreter python
          pip install --no-index --find-links dist yara-orm
      - name: Run tests with 100% coverage gate
        run: pytest -q --cov=yara_orm --cov-branch --cov-report=term-missing
