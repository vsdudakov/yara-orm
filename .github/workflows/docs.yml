name: Docs

# Build the MkDocs Material site and deploy it to GitHub Pages.
# Pages source must be set to "GitHub Actions" in repo Settings → Pages.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Cairo/Pango (social cards)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev \
            libjpeg-dev libpng-dev libz-dev pngquant
      - name: Install docs dependencies (pyproject [docs] extra)
        # Read the `docs` optional-dependency group straight from pyproject.toml
        # so it stays the single source of truth — without building the Rust
        # engine (the docs don't import the package).
        run: |
          python -c "import tomllib; print('\n'.join(tomllib.load(open('pyproject.toml','rb'))['project']['optional-dependencies']['docs']))" > docs-requirements.txt
          python -m pip install -U pip
          pip install -r docs-requirements.txt
      - name: Build with MkDocs
        run: mkdocs build --strict
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
