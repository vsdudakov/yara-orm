name: Release

# Build wheels + sdist on a version tag and publish to PyPI.
# Trigger by pushing a tag like `v0.1.0`.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: Wheels (${{ matrix.platform.target }} · py${{ matrix.python-version }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux ships both x86_64 and aarch64 — aarch64 is cross-built in a
        # manylinux container, so ARM64 Linux hosts (Apple-Silicon Docker, AWS
        # Graviton) get a prebuilt wheel instead of compiling from the sdist.
        # macos-latest = arm64 (Apple Silicon); macos-13 (Intel) dropped —
        # scarce runners. Add "{ os: macos-13, target: x86_64 }" for Intel Macs.
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        platform:
          - { os: ubuntu-latest, target: x86_64 }
          - { os: ubuntu-latest, target: aarch64 }
          - { os: macos-latest, target: aarch64 }
          - { os: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter python${{ matrix.python-version }}
          manylinux: auto
          # The Linux TLS backend builds a vendored OpenSSL from source, whose
          # Configure script needs Perl's IPC::Cmd (absent from some manylinux
          # images). No-op on macOS/Windows (they use their platform TLS).
          before-script-linux: |
            if command -v yum >/dev/null 2>&1; then
              yum install -y perl-IPC-Cmd perl-Data-Dumper || true
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update && apt-get install -y perl || true
            fi
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}-${{ matrix.python-version }}
          path: dist

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist

  publish:
    name: Publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_TOKEN }}
